version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: guidely-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: guidely_exhibition_db
      MYSQL_USER: guidely
      MYSQL_PASSWORD: guidely123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - guidely-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Exhibition Service from Docker Hub
  exhibition-service:
    image: yerak213/guidely-exhibition-service:latest
    container_name: guidely-exhibition-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/guidely_exhibition_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: guidely
      SPRING_DATASOURCE_PASSWORD: guidely123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - guidely-network
    restart: unless-stopped

  # Redis (선택사항 - 캐싱용)
  redis:
    image: redis:7-alpine
    container_name: guidely-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - guidely-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  guidely-network:
    driver: bridge 